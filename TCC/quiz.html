<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Técnico | Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <a href="index.html" class="logo">Técnico Connect</a>
    <div class="nav-links">
        <a href="sobre.html">Sobre</a>
        <a href="vagas.html">Vagas</a>
        <a href="guia-curriculo.html">Currículo</a>
        <a href="index.html" class="btn-login-nav">Sair do Quiz</a>
    </div>
</nav>

<header class="section header-quiz">
    <div class="reveal active">
        <span class="tag-passo-quiz">AVALIAÇÃO</span>
    </div>
</header>

<main class="section">
    <div id="quiz-container" class="container-centralizado">
        <div id="quiz-content" class="reveal active">
            <h4 class="label-teste">TESTE SEU NÍVEL</h4>
            <h2 id="question-text" class="titulo-pergunta">Carregando...</h2>
            <div id="options-container"></div>
        </div>

        <div id="result-container" class="reveal result-final">
            <h1 class="emoji-trofeu">🏆</h1>
            <h2>Quiz Finalizado!</h2>
            <p id="result-text" class="texto-resultado"></p>
            <p>Faça login para salvar este resultado no seu painel.</p><br>
            <a href="login.html" class="btn-roxo">Salvar no Aplicativo</a>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
